name: Deploy VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          cd /home/administrator/thi-truc-tuyen

          echo "== Enable pnpm =="
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

          echo "== Pull code =="
          git fetch --all
          git reset --hard origin/main

          echo "== Install BE =="
          cd be
          pnpm install --frozen-lockfile

          echo "== Install FE =="
          cd ../fe
          pnpm install --frozen-lockfile

          echo "== Build FE =="
          pnpm run build

          echo "== Restart apps =="
          cd ..
          pm2 startOrReload ecosystem.config.js --update-env

          echo "== Done =="
